<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#ab1f49" />
    <meta name="background-color" content="#7a1c3c" />
    <meta name="description" content="Aplikasi kasir profesional untuk jual beli dan penyewaan" />
    
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KasirKu" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>POS System - Kasir Jual Beli & Penyewaan Profesional</title>

    <!-- Splash screen for iOS -->
    <style>
      /* PWA splash screen */
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ab1f49 0%, #7a1c3c 100%);
        color: white;
        transition: opacity 0.5s ease;
      }
      #pwa-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #pwa-splash .logo {
        width: 80px;
        height: 80px;
        animation: pulse-logo 2s ease-in-out infinite;
      }
      #pwa-splash .title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-top: 1rem;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      #pwa-splash .subtitle {
        font-size: 0.875rem;
        opacity: 0.7;
        margin-top: 0.25rem;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      #pwa-splash .loader {
        margin-top: 2rem;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <!-- PWA Splash Screen -->
    <div id="pwa-splash">
      <img src="/icon.svg" alt="Logo" class="logo" />
      <div class="title">KasirKu</div>
      <div class="subtitle">Memuat aplikasi...</div>
      <div class="loader"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide splash when app loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('pwa-splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
